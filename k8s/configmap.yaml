apiVersion: v1
kind: ConfigMap
metadata:
  name: illness-prediction-config
  namespace: illness-prediction
data:
  # Application
  APP_NAME: "Illness Prediction System"
  APP_VERSION: "1.0.0"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  
  # API
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_PREFIX: "/api/v1"
  
  # Database
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "illness_prediction"
  
  # Redis
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_SESSION_TTL: "86400"
  
  # LLM
  LLM_PROVIDER: "openai"
  LLM_MODEL: "gpt-4"
  LLM_TEMPERATURE: "0.7"
  LLM_MAX_TOKENS: "500"
  LLM_TIMEOUT: "30"
  
  # ML Model
  MODEL_REGISTRY_URI: "file:///app/models"
  MODEL_NAME: "illness_predictor"
  PREDICTION_CONFIDENCE_THRESHOLD: "0.30"
  TOP_K_PREDICTIONS: "3"
  
  # Question Engine
  MAX_QUESTIONS_PER_SESSION: "15"
  CONFIDENCE_STOP_THRESHOLD: "0.80"
  
  # Location Service
  FACILITY_SEARCH_RADIUS_KM: "50.0"
  MAX_FACILITIES_RETURNED: "5"
  
  # Translation
  DEFAULT_LANGUAGE: "en"
  
  # Monitoring
  ENABLE_PROMETHEUS: "true"
  PROMETHEUS_PORT: "9090"
  
  # Drift Detection
  DRIFT_PSI_THRESHOLD: "0.25"
  DRIFT_CHECK_WINDOW_DAYS: "7"
  DRIFT_ACCURACY_DROP_THRESHOLD: "0.05"
  
  # Training
  TRAINING_DATA_PATH: "/app/data/training"
  VALIDATION_SPLIT: "0.2"
  MIN_SAMPLES_PER_CLASS: "10"
  
  # Deployment
  CANARY_INITIAL_TRAFFIC: "0.10"
  CANARY_INCREMENT: "0.40"
  CANARY_MONITORING_HOURS: "24"
  
  # Security
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  
  # Rate Limiting
  RATE_LIMIT_PER_MINUTE: "60"
  RATE_LIMIT_PER_HOUR: "1000"
