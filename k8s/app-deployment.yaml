apiVersion: apps/v1
kind: Deployment
metadata:
  name: illness-prediction-app
  namespace: illness-prediction
  labels:
    app: illness-prediction
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: illness-prediction
  template:
    metadata:
      labels:
        app: illness-prediction
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z postgres-service 5432; do echo waiting for postgres; sleep 2; done;']
      - name: wait-for-redis
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z redis-service 6379; do echo waiting for redis; sleep 2; done;']
      containers:
      - name: app
        image: illness-prediction:latest  # Replace with your registry
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        env:
        # ConfigMap values
        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: illness-prediction-config
              key: APP_NAME
        - name: APP_VERSION
          valueFrom:
            configMapKeyRef:
              name: illness-prediction-config
              key: APP_VERSION
        - name: DEBUG
          valueFrom:
            configMapKeyRef:
              name: illness-prediction-config
              key: DEBUG
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: illness-prediction-config
              key: LOG_LEVEL
        - name: API_HOST
          valueFrom:
            configMapKeyRef:
              name: illness-prediction-config
              key: API_HOST
        - name: API_PORT
          valueFrom:
            configMapKeyRef:
              name: illness-prediction-config
              key: API_PORT
        - name: POSTGRES_HOST
          valueFrom:
            configMapKeyRef:
              name: illness-prediction-config
              key: POSTGRES_HOST
        - name: POSTGRES_PORT
          valueFrom:
            configMapKeyRef:
              name: illness-prediction-config
              key: POSTGRES_PORT
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: illness-prediction-config
              key: POSTGRES_DB
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: illness-prediction-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: illness-prediction-config
              key: REDIS_PORT
        - name: LLM_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: illness-prediction-config
              key: LLM_PROVIDER
        - name: LLM_MODEL
          valueFrom:
            configMapKeyRef:
              name: illness-prediction-config
              key: LLM_MODEL
        - name: MODEL_NAME
          valueFrom:
            configMapKeyRef:
              name: illness-prediction-config
              key: MODEL_NAME
        - name: PREDICTION_CONFIDENCE_THRESHOLD
          valueFrom:
            configMapKeyRef:
              name: illness-prediction-config
              key: PREDICTION_CONFIDENCE_THRESHOLD
        - name: MAX_QUESTIONS_PER_SESSION
          valueFrom:
            configMapKeyRef:
              name: illness-prediction-config
              key: MAX_QUESTIONS_PER_SESSION
        # Secret values
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: illness-prediction-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: illness-prediction-secrets
              key: POSTGRES_PASSWORD
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: illness-prediction-secrets
              key: ENCRYPTION_KEY
        - name: LLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: illness-prediction-secrets
              key: LLM_API_KEY
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: illness-prediction-secrets
              key: JWT_SECRET_KEY
        - name: GOOGLE_PLACES_API_KEY
          valueFrom:
            secretKeyRef:
              name: illness-prediction-secrets
              key: GOOGLE_PLACES_API_KEY
        - name: TWILIO_ACCOUNT_SID
          valueFrom:
            secretKeyRef:
              name: illness-prediction-secrets
              key: TWILIO_ACCOUNT_SID
        - name: TWILIO_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: illness-prediction-secrets
              key: TWILIO_AUTH_TOKEN
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: models
          mountPath: /app/models
        - name: data
          mountPath: /app/data
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: models-pvc
      - name: data
        persistentVolumeClaim:
          claimName: data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: models-pvc
  namespace: illness-prediction
spec:
  accessModes:
    - ReadWriteMany  # Multiple pods need to read models
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-pvc
  namespace: illness-prediction
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
---
apiVersion: v1
kind: Service
metadata:
  name: illness-prediction-service
  namespace: illness-prediction
  labels:
    app: illness-prediction
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: illness-prediction
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: illness-prediction-hpa
  namespace: illness-prediction
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: illness-prediction-app
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
