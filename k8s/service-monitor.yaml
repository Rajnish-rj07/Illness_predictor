# ServiceMonitor for Prometheus Operator
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: illness-prediction-metrics
  namespace: illness-prediction
  labels:
    app: illness-prediction
    release: prometheus
spec:
  selector:
    matchLabels:
      app: illness-prediction
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
    scheme: http
---
# PrometheusRule for alerting
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: illness-prediction-alerts
  namespace: illness-prediction
  labels:
    app: illness-prediction
    release: prometheus
spec:
  groups:
  - name: illness-prediction
    interval: 30s
    rules:
    # High error rate
    - alert: HighErrorRate
      expr: |
        rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.01
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "High error rate detected"
        description: "Error rate is {{ $value | humanizePercentage }} (threshold: 1%)"
    
    # High latency
    - alert: HighLatency
      expr: |
        histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High latency detected"
        description: "P95 latency is {{ $value }}s (threshold: 0.5s)"
    
    # Model accuracy degradation
    - alert: ModelAccuracyDegradation
      expr: |
        model_accuracy < 0.80
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Model accuracy degraded"
        description: "Model accuracy is {{ $value | humanizePercentage }} (threshold: 80%)"
    
    # Data drift detected
    - alert: DataDriftDetected
      expr: |
        drift_psi_score > 0.25
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Data drift detected"
        description: "PSI score is {{ $value }} (threshold: 0.25)"
    
    # Pod not ready
    - alert: PodNotReady
      expr: |
        kube_pod_status_ready{namespace="illness-prediction", condition="false"} == 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Pod not ready"
        description: "Pod {{ $labels.pod }} is not ready"
    
    # High memory usage
    - alert: HighMemoryUsage
      expr: |
        container_memory_usage_bytes{namespace="illness-prediction"} / container_spec_memory_limit_bytes{namespace="illness-prediction"} > 0.9
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High memory usage"
        description: "Memory usage is {{ $value | humanizePercentage }}"
    
    # High CPU usage
    - alert: HighCPUUsage
      expr: |
        rate(container_cpu_usage_seconds_total{namespace="illness-prediction"}[5m]) > 0.9
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High CPU usage"
        description: "CPU usage is {{ $value | humanizePercentage }}"
