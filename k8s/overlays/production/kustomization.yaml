apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: illness-prediction

bases:
  - ../../

commonLabels:
  environment: production

images:
  - name: illness-prediction
    newName: ghcr.io/your-org/illness-prediction
    newTag: latest

replicas:
  - name: illness-prediction-app
    count: 5

patchesStrategicMerge:
  - |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: illness-prediction-app
    spec:
      template:
        spec:
          containers:
          - name: app
            resources:
              requests:
                memory: "512Mi"
                cpu: "500m"
              limits:
                memory: "2Gi"
                cpu: "2000m"

configMapGenerator:
  - name: illness-prediction-config
    behavior: merge
    literals:
      - DEBUG=false
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
