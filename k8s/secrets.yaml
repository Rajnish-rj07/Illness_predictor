apiVersion: v1
kind: Secret
metadata:
  name: illness-prediction-secrets
  namespace: illness-prediction
type: Opaque
stringData:
  # Database credentials
  POSTGRES_USER: "illness_pred_user"
  POSTGRES_PASSWORD: "changeme"  # Replace with actual password
  
  # Redis password (if needed)
  REDIS_PASSWORD: ""
  
  # Encryption key (generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
  ENCRYPTION_KEY: "changeme-generate-secure-key"
  
  # LLM API key
  LLM_API_KEY: "changeme"
  
  # Twilio credentials
  TWILIO_ACCOUNT_SID: ""
  TWILIO_AUTH_TOKEN: ""
  TWILIO_PHONE_NUMBER: ""
  TWILIO_WHATSAPP_NUMBER: ""
  
  # Google Places API key
  GOOGLE_PLACES_API_KEY: ""
  
  # Translation API key
  TRANSLATION_API_KEY: ""
  
  # JWT secret
  JWT_SECRET_KEY: "changeme-generate-secure-jwt-key"
---
# Note: In production, use external secret management like:
# - Kubernetes External Secrets Operator
# - HashiCorp Vault
# - AWS Secrets Manager
# - Azure Key Vault
# - Google Secret Manager
